name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fixpilot
          POSTGRES_PASSWORD: fixpilot123
          POSTGRES_DB: fixpilot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fixpilot -d fixpilot_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: sqlite+aiosqlite:///./backend/test/ci.db
      DATABASE_URL_SYNC: sqlite:///./backend/test/ci.db
      SECRET_KEY: ci-secret-key
      OPENAI_API_KEY: ci-openai-key
      CELERY_TASK_ALWAYS_EAGER: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Ruff lint
        run: >-
          python -m ruff check
          backend/app/core/observability.py
          backend/app/services/task_state_machine.py
          backend/app/services/trace_metrics.py
          backend/app/services/vector_store.py
          backend/test/test_alembic_migrations.py
          backend/test/test_quality_gate_config.py
          backend/test/test_observability.py
          backend/test/test_vector_store_pgvector.py

      - name: Mypy
        run: >-
          python -m mypy
          backend/app/core/observability.py
          backend/app/services/task_state_machine.py
          backend/app/services/trace_metrics.py
          backend/app/services/vector_store.py

      - name: Alembic migration smoke
        env:
          FIXPILOT_ALEMBIC_DATABASE_URL: sqlite:///./backend/test/alembic_ci.db
        run: |
          python -m alembic -c backend/alembic.ini upgrade head
          python -m alembic -c backend/alembic.ini downgrade base

      - name: Focused pytest suite
        run: >-
          python -m pytest
          backend/test/test_alembic_migrations.py
          backend/test/test_quality_gate_config.py
          backend/test/test_observability.py
          backend/test/test_vector_store_pgvector.py
          backend/test/test_trace_aggregate_metrics.py
          backend/test/test_task_state_machine.py
          backend/test/test_task_status_audit.py
          backend/test/test_retrieval_benchmark.py
          backend/test/test_real_issue_rag_benchmark.py

      - name: Focused coverage report
        run: >-
          python -m coverage run -m pytest
          backend/test/test_observability.py
          backend/test/test_vector_store_pgvector.py
          backend/test/test_trace_aggregate_metrics.py
          backend/test/test_task_state_machine.py
          backend/test/test_task_status_audit.py
          &&
          python -m coverage report
          --include="backend/app/core/observability.py,backend/app/services/task_state_machine.py,backend/app/services/task_status_audit.py,backend/app/services/trace_metrics.py,backend/app/services/vector_store.py"
          --fail-under=60

  frontend:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
